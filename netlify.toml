[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    # Scripts: only self + SheetJS CDN. Fonts from Google. Zero outbound data connections.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'none'; img-src 'self' data:; object-src 'none'; frame-ancestors 'none'; base-uri 'self';"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    # Prevent caching of sensitive financial data
    Cache-Control = "no-store, no-cache, must-revalidate, private"
